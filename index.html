<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieExpo</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-backdrop" id="menuBackdrop"></div>
        <div class="mobile-menu-panel">
            <div class="mobile-menu-header">
                <h2>MovieExpo</h2>
                <button class="mobile-close" id="menuClose" aria-label="Close menu">&times;</button>
            </div>
            <nav class="mobile-menu-links">
                <a href="./index.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="./genre.html"><i class="fa-solid fa-film"></i> Genres</a>
                <a href="https://x.com/AscendEleven" target="_blank"><i class="fa-solid fa-envelope"></i> Contact</a>
            </nav>
        </div>
    </div>

    <div class="main-body">
        <div class="main">

            <div class="navbar">
                <h2>MovieExpo</h2>
                <div class="navbar-links">
                    <a href="./index.html">Home</a>
                    <a href="./genre.html">Genres</a>
                    <a href="https://x.com/AscendEleven" target="_blank">Contact</a>
                </div>
                <div class="navbar-right">
                    <div class="search">
                        <input placeholder="Search..." />
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>

            <div class="hero">
                <h1>Shortly after...</h1>
            </div>

            <div class="footer">
                <div class="footer-content">
                    <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
                    <div class="footer-links">
                        <a href="./index.html">Home</a>
                        <a href="./genre.html">Genres</a>
                        <a href="https://x.com/AscendEleven" target="_blank">Contact</a>
                    </div>
                    <h3>V1.0</h3>
                </div>
                <h2>MOVIEEXPO</h2>
            </div>

        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuBackdrop = document.getElementById('menuBackdrop');
        const menuClose = document.getElementById('menuClose');

        function openMenu() {
            mobileMenu.classList.add('open');
            hamburger.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            mobileMenu.classList.remove('open');
            hamburger.classList.remove('active');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        menuBackdrop.addEventListener('click', closeMenu);

        document.querySelectorAll('.mobile-menu-links a').forEach(a => {
            a.addEventListener('click', closeMenu);
        });
    </script>
    <script src="./JS/script.js"></script>
</body>

</html>
